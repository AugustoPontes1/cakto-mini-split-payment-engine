version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cakto_prod
      POSTGRES_USER: cakto_prod
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cakto_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cakto-prod
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  app:
    image: ${DOCKER_USERNAME:-localhost}/cakto:latest
    environment:
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://cakto_prod:${DB_PASSWORD}@db:5432/cakto_prod
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      SECURE_SSL_REDIRECT: "true"
      SESSION_COOKIE_SECURE: "true"
      CSRF_COOKIE_SECURE: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cakto-prod
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:

networks:
  cakto-prod:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1450
