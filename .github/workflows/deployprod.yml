name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'docs/**'

jobs:
  # ===== BUILD & PUSH IMAGE =====
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: tests

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cakto:latest
            ${{ secrets.DOCKER_USERNAME }}/cakto:prod
            ${{ secrets.DOCKER_USERNAME }}/cakto:${{ github.sha }}

  # ===== DEPLOY TO PRODUCTION =====
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production (Docker Swarm)
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "📦 Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/cakto:latest

            echo "🚀 Deploying to production..."
            cd /opt/cakto

            # Export environment variables
            export SECRET_KEY="${{ secrets.PROD_SECRET_KEY }}"
            export DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}"
            export ALLOWED_HOSTS="${{ secrets.PROD_ALLOWED_HOSTS }}"

            # Deploy
            docker stack deploy -c docker-compose.prod.yml cakto-prod

            echo "⏳ Waiting for services to be healthy..."
            sleep 15

            echo "✅ Production deployment complete!"
            echo "📊 Services status:"
            docker service ls | grep cakto-prod || true

            echo "📋 Recent logs:"
            docker service logs cakto-prod_app --tail 20 || true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Production deployment for ${{ github.ref }}

            Image: ${{ secrets.DOCKER_USERNAME }}/cakto:${{ github.sha }}
          draft: false
          prerelease: false

      - name: Notify success
        if: success()
        run: echo "✅ Production deployment successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Production deployment failed!"
