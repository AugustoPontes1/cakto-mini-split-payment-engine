version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: cakto-db-dev
    environment:
      POSTGRES_DB: cakto
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dev"]
      interval: 2s
      timeout: 3s
      retries: 5
    networks:
      - cakto-dev

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cakto-app-dev
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "true"
      SECRET_KEY: "dev-secret-key-change-in-production"
      DATABASE_URL: postgresql://dev:dev@db:5432/cakto
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    volumes:
      - .:/app
    networks:
      - cakto-dev

volumes:
  postgres_data_dev:

networks:
  cakto-dev:
    driver: bridge
