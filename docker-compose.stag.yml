version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cakto_stag
      POSTGRES_USER: stag
      POSTGRES_PASSWORD: stag_secure_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_stag:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "stag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cakto-stag
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  app:
    image: ${DOCKER_USERNAME:-localhost}/cakto:stag
    build:
      context: .
      dockerfile: Dockerfile.stag
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://stag:stag_secure_password_123@db:5432/cakto_stag
      ALLOWED_HOSTS: "localhost,127.0.0.1,staging.example.com"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cakto-stag
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data_stag:

networks:
  cakto-stag:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1450
